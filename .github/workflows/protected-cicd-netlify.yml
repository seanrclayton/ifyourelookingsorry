name: Build and Deploy to Netlify

on:
  workflow_dispatch:
    inputs:
      action:
        description: deploy or rollback
        required: true
        type: choice
        options:
          - deploy
          - rollback
      target_sha:
        description: commit SHA to deploy or roll back to
        required: false
        type: string
      target_environments:
        description: comma-separated envs, e.g. dev,int,prod
        required: true
        type: string
      requested_by:
        description: user requesting the action
        required: false
        type: string
      image_name_override:
        description: optional image name override
        required: false
        type: string
      service:
        description: service name
        required: true
        default: mothra
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: [actions/checkout@v4](https://github.com)
      - name: Use Node.js
        uses: [actions/setup-node@v4](https://github.com)
        with:
          node-version: '20' # Or your project's required Node version
          cache: 'npm' # Or yarn, pnpm
      - run: npm install # Or yarn install, pnpm install
      - run: npm run build # Your project's build command
      - name: Deploy to Netlify
        uses: [nwtgck/actions-netlify@v3.0](https://github.com/marketplace/actions/netlify-actions)
        with:
          publish-dir: './dist' # The directory to publish (e.g., './dist', './_site')
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
