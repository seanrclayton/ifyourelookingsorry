name: Build and Deploy to Netlify

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "dontexist" ]
  pull_request:
    branches: [ "dontexist" ]
  workflow_dispatch:
    inputs:
      action:
        description: deploy or rollback
        required: true
        type: choice
        options:
          - deploy
          - rollback
      target_sha:
        description: commit SHA to deploy or roll back to
        required: false
        type: string
      target_environments:
        description: comma-separated envs, e.g. dev,int,prod
        required: false
        type: string
      requested_by:
        description: user requesting the action
        required: false
        type: string
      image_name_override:
        description: optional image name override
        required: false
        type: string
      service:
        description: service name
        required: true
        default: mothra
        type: string
      app_name:
        description: app name
        required: true
        default: mothra
        type: string
      tag_latest:
        description: the latest tag
        required: true
        default: dev
        type: string
        
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout requested revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.ref }}

      - uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.event.inputs.action }} for ${{ github.event.inputs.target_sha || github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
